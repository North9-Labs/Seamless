name: Security Audit
on:
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday
  push:
    paths: ['Cargo.toml', 'Cargo.lock']

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
